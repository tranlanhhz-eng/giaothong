<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS - Bản đồ Giao thông Google Maps Đa Nền</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }
        .info-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); max-width: 300px;
            font-family: Arial, sans-serif;
        }
        /* Tùy biến để đưa thanh chuyển bản đồ nền sang góc bên trái dưới nút phóng to/thu nhỏ */
        .leaflet-left .leaflet-control {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="info-panel">
        <h3>Thông tin thuộc tính</h3>
        <p>Bấm vào đối tượng trên bản đồ để xem chi tiết.</p>
        <div id="feature-info"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. ĐỊNH NGHĨA 3 BẢN ĐỒ NỀN GOOGLE MAPS
        var googleRoadmap = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            attribution: '© Google Maps', maxZoom: 22, maxNativeZoom: 20
        });

        var googleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            attribution: '© Google Maps', maxZoom: 22, maxNativeZoom: 20
        });

        var googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            attribution: '© Google Maps', maxZoom: 22, maxNativeZoom: 20
        });

        // 2. KHỞI TẠO BẢN ĐỒ (Mặc định hiển thị bản đồ giao thông Roadmap)
        var map = L.map('map', {
            center: [16.047079, 108.206230],
            zoom: 6,
            layers: [googleRoadmap] // Bản đồ xuất hiện đầu tiên khi tải trang
        });

        // 3. TẠO DANH SÁCH BẢN ĐỒ NỀN ĐỂ CHÈN VÀO THANH BẬT TẮT
        var baseMaps = {
            "Google Giao thông": googleRoadmap,
            "Google Vệ tinh": googleSatellite,
            "Google Vệ tinh Lai (Hiện tên đường)": googleHybrid
        };

        // 4. THÊM THANH BẬT TẮT VÀO GÓC BÊN TRÁI (topleft)
        L.control.layers(baseMaps, null, {
            position: 'topleft', // Đặt thanh điều khiển ở bên trái màn hình
            collapsed: false     // Giữ thanh luôn mở rộng để người dùng dễ chọn (đổi thành true nếu muốn ẩn vào icon)
        }).addTo(map);


        // 5. ĐỌC VÀ HIỂN THỊ DỮ LIỆU GEOJSON CỦA BẠN
        fetch('map_data.geojson')
            .then(response => {
                if (!response.ok) throw new Error('Không thể tải file dữ liệu');
                return response.json();
            })
            .then(data => {
                var geojsonLayer = L.geoJSON(data, {
                    style: function (feature) {
                        return {
                            color: "#ff3333", // Đường viền màu đỏ nổi bật cho các tuyến giao thông
                            weight: 4,        // Độ đậm của đường nét tuyển đường
                            opacity: 0.85
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        layer.on('click', function (e) {
                            var props = feature.properties;
                            var html = "<ul style='padding-left: 15px; max-height: 250px; overflow-y: auto;'>";
                            for (var key in props) {
                                html += `<li><strong>${key}:</strong> ${props[key]}</li>`;
                            }
                            html += "</ul>";
                            document.getElementById('feature-info').innerHTML = html;
                        });
                    }
                }).addTo(map);

                // Tự động zoom thẳng vào khu vực mạng lưới giao thông của bạn
                map.fitBounds(geojsonLayer.getBounds());
            })
            .catch(error => {
                console.error(error);
                document.getElementById('feature-info').innerHTML = "<p style='color:red;'>Lỗi tải dữ liệu. Kiểm tra lại file map_data.geojson</p>";
            });
    </script>
</body>
</html>
