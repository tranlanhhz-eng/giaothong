<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS - EPSG:3857 Bản đồ hiển thị</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }
        .info-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); max-width: 300px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="info-panel">
        <h3>Thông tin thuộc tính</h3>
        <p>Bấm vào đối tượng trên bản đồ để xem chi tiết.</p>
        <div id="feature-info"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4leaflet/1.0.2/proj4leaflet.min.js"></script>

    <script>
        // Định nghĩa hệ tọa độ EPSG:3857 cho Leaflet thông qua Proj4Leaflet
        var crs3857 = new L.Proj.CRS('EPSG:3857',
            '+proj=merc +a=6378137 +b=6378137 +lat_ts=0 +lon_0=0 +x_0=0 +y_0=0 +k=1 +units=m +nadgrids=@null +wktext +no_defs',
            {
                resolutions: [
                    156543.03392804097, 78271.51696402048, 39135.75848201024,
                    19567.87924100512, 9783.93962050256, 4891.96981025128,
                    2445.98490512564, 1222.99245256282, 611.49622628141,
                    305.748113140705, 152.8740565703525, 76.43702828517625,
                    38.21851414258813, 19.109257071294063, 9.554628535647032,
                    4.777314267823516, 2.388657133911758, 1.194328566955879,
                    0.5971642834779395, 0.29858214173896974
                ]
            }
        );

        // QUAN TRỌNG: Khởi tạo bản đồ và ép bản đồ sử dụng Hệ tọa độ EPSG:3857 vừa định nghĩa
        var map = L.map('map', {
            crs: crs3857,
            continuousWorld: true,
            worldCopyJump: false
        }).setView([16.047079, 108.206230], 6);

        // Thêm lớp bản đồ nền OpenStreetMap (Nền OSM gốc cũng chạy trên 3857 nên sẽ khớp hoàn toàn)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            noWrap: true // Tránh việc lặp bản đồ vô tận sang hai bên vĩ độ
        }).addTo(map);

        // Tải và xử lý file dữ liệu GeoJSON 
        fetch('map_data.geojson')
            .then(response => response.json())
            .then(data => {
                
                // Do bản đồ đang chạy hệ 3857 và dữ liệu của bạn cũng là hệ 3857, 
                // chúng ta truyền thẳng dữ liệu vào L.geoJSON mà KHÔNG CẦN chuyển đổi tọa độ thủ công nữa.
                var geojsonLayer = L.geoJSON(data, {
                    style: function (feature) {
                        return {
                            color: "#3388ff", // Màu đường viền đối tượng
                            weight: 2,
                            opacity: 0.8,
                            fillColor: "#3388ff", // Màu nền đối tượng (Polygon)
                            fillOpacity: 0.4
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        // Hiển thị thông tin thuộc tính dạng bảng danh sách khi click
                        layer.on('click', function (e) {
                            var properties = feature.properties;
                            var htmlContent = "<ul style='padding-left: 15px;'>";
                            for (var key in properties) {
                                htmlContent += `<li><strong>${key}:</strong> ${properties[key]}</li>`;
                            }
                            htmlContent += "</ul>";
                            document.getElementById('feature-info').innerHTML = htmlContent;
                            
                            // Highlight nhẹ đối tượng khi được click
                            if (typeof layer.setStyle === 'function') {
                                geojsonLayer.resetStyle();
                                layer.setStyle({ weight: 4, color: '#ff3333', fillOpacity: 0.6 });
                            }
                        });
                    }
                }).addTo(map);

                // Tự động căn chỉnh màn hình vừa vặn với toàn bộ khu vực của dữ liệu
                map.fitBounds(geojsonLayer.getBounds());
            })
            .catch(error => {
                console.error('Lỗi khi đọc file GeoJSON:', error);
                document.getElementById('feature-info').innerHTML = "<p style='color:red;'>Không thể tải dữ liệu bản đồ. Hãy chắc chắn file map_data.geojson nằm cùng thư mục với file index.html</p>";
            });
    </script>
</body>
</html>
