<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS - Bản đồ hiển thị</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; background: #f4f4f4; }
        .info-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); max-width: 300px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="info-panel">
        <h3>Thông tin thuộc tính</h3>
        <p>Bấm vào đối tượng trên bản đồ để xem chi tiết.</p>
        <div id="feature-info"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

    <script>
        // Khởi tạo bản đồ nền tập trung vào Việt Nam
        var map = L.map('map').setView([16.047079, 108.206230], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Hàm chuyển đổi tọa độ nâng cao xử lý triệt để mọi kiểu hình học (Point, Line, Polygon)
        function transformCoords(coords, type) {
            if (type === 'Point') {
                var p = proj4('EPSG:3857', 'EPSG:4326', coords);
                return [p[1], p[0]];
            }
            if (type === 'LineString' || type === 'MultiPoint') {
                return coords.map(function(c) {
                    var p = proj4('EPSG:3857', 'EPSG:4326', c);
                    return [p[1], p[0]];
                });
            }
            if (type === 'Polygon' || type === 'MultiLineString') {
                return coords.map(function(ring) {
                    return ring.map(function(c) {
                        var p = proj4('EPSG:3857', 'EPSG:4326', c);
                        return [p[1], p[0]];
                    });
                });
            }
            if (type === 'MultiPolygon') {
                return coords.map(function(poly) {
                    return poly.map(function(ring) {
                        return ring.map(function(c) {
                            var p = proj4('EPSG:3857', 'EPSG:4326', c);
                            return [p[1], p[0]];
                        });
                    });
                });
            }
            return coords;
        }

        // Đọc dữ liệu
        fetch('map_data.geojson')
            .then(function(response) {
                if (!response.ok) throw new Error('Không thể tải file dữ liệu');
                return response.json();
            })
            .then(function(data) {
                // Tiến hành ép cấu trúc hình học EPSG:3857 sang WGS84
                var cleanData = JSON.parse(JSON.stringify(data));
                cleanData.features.forEach(function(feature) {
                    if (feature.geometry && feature.geometry.coordinates) {
                        feature.geometry.coordinates = transformCoords(feature.geometry.coordinates, feature.geometry.type);
                    }
                });

                // Hiển thị lên bản đồ nền web
                var geojsonLayer = L.geoJson(cleanData, {
                    style: function (feature) {
                        return { color: "#ff3333", weight: 3, opacity: 0.85, fillColor: "#ffaa00", fillOpacity: 0.4 };
                    },
                    onEachFeature: function (feature, layer) {
                        layer.on('click', function (e) {
                            var props = feature.properties;
                            var html = "<ul style='padding-left: 15px;'>";
                            for (var key in props) {
                                html += "<li><strong>" + key + ":</strong> " + props[key] + "</li>";
                            }
                            html += "</ul>";
                            document.getElementById('feature-info').innerHTML = html;
                        });
                    }
                }).addTo(map);

                // Tự động thu phóng màn hình tới đúng vị trí tuyến đường/đối tượng dữ liệu của bạn
                map.fitBounds(geojsonLayer.getBounds());
            })
            .catch(function(error) {
                console.error(error);
                document.getElementById('feature-info').innerHTML = "<p style='color:red;'>Lỗi xử lý dữ liệu cấu trúc GeoJSON. Hãy chắc chắn tệp không bị rỗng.</p>";
            });
    </script>
</body>
</html>
