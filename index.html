<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS - Bản đồ Giao thông</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }
        .info-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); max-width: 300px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="info-panel">
        <h3>Thông tin thuộc tính</h3>
        <p>Bấm vào đối tượng trên bản đồ để xem chi tiết.</p>
        <div id="feature-info"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Khởi tạo bản đồ nền OpenStreetMap
        var map = L.map('map').setView([16.047079, 108.206230], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Đọc trực tiếp dữ liệu GeoJSON chuẩn hệ 4326
        fetch('map_data.geojson')
            .then(response => {
                if (!response.ok) throw new Error('Không thể tải file dữ liệu');
                return response.json();
            })
            .then(data => {
                var geojsonLayer = L.geoJSON(data, {
                    style: function (feature) {
                        return {
                            color: "#ff3333", // Đường viền màu đỏ nổi bật cho giao thông
                            weight: 4,
                            opacity: 0.85
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        layer.on('click', function (e) {
                            var props = feature.properties;
                            var html = "<ul style='padding-left: 15px; max-height: 200px; overflow-y: auto;'>";
                            for (var key in props) {
                                html += `<li><strong>${key}:</strong> ${props[key]}</li>`;
                            }
                            html += "</ul>";
                            document.getElementById('feature-info').innerHTML = html;
                        });
                    }
                }).addTo(map);

                // Tự động zoom thẳng vào khu vực có dữ liệu đường sá của bạn
                map.fitBounds(geojsonLayer.getBounds());
            })
            .catch(error => {
                console.error(error);
                document.getElementById('feature-info').innerHTML = "<p style='color:red;'>Lỗi tải dữ liệu. Kiểm tra lại file map_data.geojson</p>";
            });
    </script>
</body>
</html>
