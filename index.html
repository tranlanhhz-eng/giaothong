<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS - Bản đồ Giao thông Google Maps</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }
        .info-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); max-width: 300px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="info-panel">
        <h3>Thông tin thuộc tính</h3>
        <p>Bấm vào đối tượng trên bản đồ để xem chi tiết.</p>
        <div id="feature-info"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Khởi tạo bản đồ nền tập trung vào Việt Nam
        var map = L.map('map').setView([16.047079, 108.206230], 6);

        // --- CẤU HÌNH BẢN ĐỒ NỀN GOOGLE MAPS ---
        // Bạn có thể chọn 1 trong các kiểu hiển thị dưới đây bằng cách thay đổi ký tự cuối cùng của link (lyrs=...)
        // m: Bản đồ giao thông chuẩn (Default Google Maps)
        // s: Bản đồ Vệ tinh (Satellite)
        // y: Bản đồ Vệ tinh có hiện tên đường (Hybrid)
        // p: Bản đồ địa hình (Terrain)
        
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            attribution: '© Google Maps',
            maxZoom: 22,        // Giữ nguyên tính năng mở khóa zoom kịch kim cấp 22
            maxNativeZoom: 20   // Google Maps hỗ trợ ảnh gốc lên tới cấp 20, zoom rất nét
        }).addTo(map);

        // Đọc dữ liệu GeoJSON (Hệ tọa độ 4326 chuẩn quốc tế)
        fetch('map_data.geojson')
            .then(response => {
                if (!response.ok) throw new Error('Không thể tải file dữ liệu');
                return response.json();
            })
            .then(data => {
                var geojsonLayer = L.geoJSON(data, {
                    style: function (feature) {
                        return {
                            color: "#ff3333", // Đường viền màu đỏ nổi bật cho các tuyến giao thông
                            weight: 4,        // Độ đậm của đường nét tuyển đường
                            opacity: 0.85
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        // Sự kiện khi người dùng click vào đường giao thông
                        layer.on('click', function (e) {
                            var props = feature.properties;
                            var html = "<ul style='padding-left: 15px; max-height: 250px; overflow-y: auto;'>";
                            for (var key in props) {
                                html += `<li><strong>${key}:</strong> ${props[key]}</li>`;
                            }
                            html += "</ul>";
                            document.getElementById('feature-info').innerHTML = html;
                        });
                    }
                }).addTo(map);

                // Tự động zoom thẳng vào khu vực mạng lưới giao thông của bạn ngay khi tải trang
                map.fitBounds(geojsonLayer.getBounds());
            })
            .catch(error => {
                console.error(error);
                document.getElementById('feature-info').innerHTML = "<p style='color:red;'>Lỗi tải dữ liệu. Kiểm tra lại file map_data.geojson</p>";
            });
    </script>
</body>
</html>
